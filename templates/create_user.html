<!DOCTYPE html>
<html>
<head>

    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">
        <div class="text-center mb-4">

    <img src="{{ url_for('static', filename='logo.png') }}"
         alt="Nkgwete Logo"
         style="max-width:220px; height:auto;">

</div>
        <h2 class="mb-4">

            Create Regional Manager

        </h2>

        {% if success %}

        <div class="alert alert-success">

            {{ success }}

        </div>

        {% endif %}

        <form method="POST">

            <!-- USERNAME -->

            <input type="text"
                   name="username"
                   class="form-control mb-3"
                   placeholder="Add Username"
                   required>

            <!-- PASSWORD -->

            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Add Password"
                   required>

            <!-- ROLE -->

            <select name="role"
                    class="form-control mb-3"
                    required>

                <option value="">

                    Select Role

                </option>

                <option>

                    Regional Manager

                </option>

                <option>

                    HR

                </option>

                <option>

                    Operations Manager

                </option>

            </select>

            <!-- REGION -->

            <select name="region"
                    class="form-control mb-4"
                    required>

                <option value="">

                    Select Region

                </option>

                <option>

                    Eastern Cape

                </option>

                <option>

                    Free State

                </option>

                <option>

                    Gauteng

                </option>

                <option>

                    KwaZulu-Natal

                </option>

                <option>

                    Limpopo

                </option>

                <option>

                    Mpumalanga

                </option>

                <option>

                    Northern Cape

                </option>

                <option>

                    North West

                </option>

                <option>

                    Western Cape

                </option>

            </select>

            <!-- BUTTON -->

            <button class="btn btn-primary btn-lg w-100">

                Create User

            </button>

        </form>

    </div>

</div>

</body>
</html>
