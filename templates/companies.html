<!DOCTYPE html>
<html>
<head>

<title>Companies</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="main-card">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='gtba_logo.png') }}"
     style="max-width:220px;">

</div>

<h2 class="mb-4">

Company Management

</h2>

<form method="POST">

<input type="text"
       name="name"
       class="form-control mb-3"
       placeholder="Company Name"
       required>

<button class="btn btn-primary">

Add Company

</button>

</form>

<hr>

<table class="table table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Company</th>
<th>Status</th>

</tr>

</thead>

<tbody>

{% for company in companies %}

<tr>

<td>{{ company.id }}</td>

<td>{{ company.name }}</td>

<td>

{% if company.active %}

<span class="badge bg-success">

Active

</span>

{% else %}

<span class="badge bg-danger">

Inactive

</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
