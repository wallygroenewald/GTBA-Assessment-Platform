<!DOCTYPE html>
<html>
<head>

    <title>Candidate Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='gtba_logo.png') }}"
                 alt="GTBA Talent Platform"
                 style="max-width:220px; height:auto;">

        </div>

        <div class="text-center mb-4">

            <h2>Candidate Login</h2>

            <p class="text-muted">

                Enter the username and password supplied by HR.

            </p>

        </div>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

               <input type="password"
             name="password"
             class="form-control"
             required>

            </div>

            <button class="btn btn-primary btn-lg w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-4">

            <a href="/"
               class="btn btn-secondary">

                Back To Home

            </a>

        </div>

    </div>

</div>

</body>
</html>
