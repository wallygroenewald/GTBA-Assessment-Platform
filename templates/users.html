<!DOCTYPE html>
<html>
<head>

    <title>Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="d-flex justify-content-between align-items-center">

            <h2>System Users</h2>

            <a href="/create-user"
               class="btn btn-primary">

                Add User

            </a>

        </div>

        <table class="table table-striped mt-4">

            <thead>

                <tr>

                    <th>Username</th>
                    <th>Role</th>
                    <th>Region</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for u in users %}

                <tr>

                    <td>{{ u.username }}</td>

                    <td>{{ u.role }}</td>

                    <td>{{ u.region }}</td>

                    <td>

                        <a href="/reset-password/{{ u.id }}"
                           class="btn btn-warning btn-sm">

                            Reset Password

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
