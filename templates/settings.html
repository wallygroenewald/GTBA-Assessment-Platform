<!DOCTYPE html>
<html>
<head>

    <title>Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">

        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='gtba_logo.png') }}"
                 style="max-width:220px; height:auto;">

        </div>

        <div class="mb-4">

            <a href="/dashboard" class="btn btn-primary me-2">
                Dashboard
            </a>

            <a href="/candidates" class="btn btn-success me-2">
                Candidates
            </a>

            <a href="/positions" class="btn btn-dark me-2">
                Positions
            </a>

            <a href="/users" class="btn btn-warning me-2">
                Users
            </a>

            <a href="/settings" class="btn btn-info me-2">
                Settings
            </a>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>

        </div>

        <hr>

        <h2 class="mb-4">

            System Settings

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Number of Questions

                </label>

                <input type="number"
                       name="question_count"
                       class="form-control"
                       value="{{ settings.question_count }}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Time Limit (Minutes)

                </label>

                <input type="number"
                       name="time_limit"
                       class="form-control"
                       value="{{ settings.time_limit }}"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Pass Mark (%)

                </label>

                <input type="number"
                       name="pass_mark"
                       class="form-control"
                       value="{{ settings.pass_mark }}"
                       required>

            </div>

            <button class="btn btn-primary">

                Save Settings

            </button>

        </form>

    </div>

</div>

</body>
</html>
