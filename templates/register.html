<!DOCTYPE html>
<html>
<head>

    <title>Candidate Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">

        <!-- LOGO -->

        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='gtba_logo.png') }}"
                 alt="GTBA Talent Platform Logo"
                 style="max-width:220px; height:auto;">

        </div>

        <div class="text-center mb-4">

      <img
        src="{{ url_for('static', filename='gtba_logo.png') }}"
        height="100"
      >

      <h2 class="mt-3">
        GTBA Talent Platform
      </h2>

     </div>

        <form method="POST">

            <!-- FULL NAME -->

            <input type="text"
                   name="fullname"
                   class="form-control mb-3"
                   placeholder="Full Name"
                   required>

            <!-- EMAIL -->

            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Email Address"
                   required>

            <!-- PHONE -->

            <input type="text"
                   name="phone"
                   class="form-control mb-3"
                   placeholder="Phone Number"
                   required>

            <!-- CITY -->

            <input type="text"
                   name="city"
                   class="form-control mb-3"
                   placeholder="City"
                   required>

            <!-- POSITION -->

            <select name="position"
                    class="form-control mb-3"
                    required>

                <option value="">

                    Select Position

                </option>

                {% for p in positions %}

                <option>

                    {{ p.name }}

                </option>

                {% endfor %}

            </select>

            <!-- REGION -->

            <select name="region"
                    class="form-control mb-3"
                    required>

                <option value="">

                    Select Province

                </option>

                <option>Eastern Cape</option>
                <option>Free State</option>
                <option>Gauteng</option>
                <option>KwaZulu-Natal</option>
                <option>Limpopo</option>
                <option>Mpumalanga</option>
                <option>Northern Cape</option>
                <option>North West</option>
                <option>Western Cape</option>

            </select>

            <!-- EXPERIENCE -->

            <select name="experience"
                    class="form-control mb-3"
                    required>

                <option value="">

                    Years Experience

                </option>

                <option>0-1 Years</option>
                <option>2-3 Years</option>
                <option>4-5 Years</option>
                <option>5+ Years</option>

            </select>

            <!-- LICENSE -->

            <select name="license"
                    class="form-control mb-3"
                    required>

                <option value="">

                    Driver License

                </option>

                <option>Yes</option>
                <option>No</option>

            </select>

            <!-- VEHICLE -->

            <select name="vehicle"
                    class="form-control mb-4"
                    required>

                <option value="">

                    Own Vehicle

                </option>

                <option>Yes</option>
                <option>No</option>

            </select>

            <!-- BUTTON -->

            <button class="btn btn-primary btn-lg w-100">

                Continue To Assessment

            </button>

        </form>

    </div>

</div>

</body>
</html>
