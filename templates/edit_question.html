<!DOCTYPE html>
<html>
<head>

    <title>Edit Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">

        <h2 class="mb-4">

            Edit Question

        </h2>

        <form method="POST">

            <textarea name="question"
                      class="form-control mb-3"
                      rows="3"
                      required>{{ question.question }}</textarea>

            <input type="text"
                   name="option1"
                   class="form-control mb-3"
                   value="{{ question.option1 }}"
                   required>

            <input type="text"
                   name="option2"
                   class="form-control mb-3"
                   value="{{ question.option2 }}"
                   required>

            <input type="text"
                   name="option3"
                   class="form-control mb-3"
                   value="{{ question.option3 }}"
                   required>

            <input type="text"
                   name="option4"
                   class="form-control mb-3"
                   value="{{ question.option4 }}"
                   required>

            <input type="text"
                   name="answer"
                   class="form-control mb-3"
                   value="{{ question.answer }}"
                   required>

            <select name="qtype"
                    class="form-control mb-4">

                <option value="technical"
                    {% if question.qtype == 'technical' %}
                    selected
                    {% endif %}>

                    technical

                </option>

                <option value="personality"
                    {% if question.qtype == 'personality' %}
                    selected
                    {% endif %}>

                    personality

                </option>

            </select>

            <button class="btn btn-primary w-100 btn-lg">

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>
</html>
