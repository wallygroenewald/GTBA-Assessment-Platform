<!DOCTYPE html>
<html>
<head>

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">
       <div class="text-center mb-4">

    <img src="{{ url_for('static', filename='gtba_logo.png') }}"
         alt="G&T Business Automation"
         style="max-width:220px; height:auto;">

     </div>
<div class="text-center mb-4">

    <a href="/dashboard" class="btn btn-primary me-2">
        Dashboard
    </a>

    <a href="/candidates" class="btn btn-success me-2">
        Candidates
    </a>

    <a href="/positions" class="btn btn-dark me-2">
        Positions
    </a>

    <a href="/users" class="btn btn-warning me-2">
        Users
    </a>

    <a href="/logout" class="btn btn-danger">
        Logout
    </a>

    <a href="/settings" class="btn btn-info me-2">
        Settings
    </a>

</div>
        <div class="text-center">

     

     <h2 class="mt-3">
        GTBA Talent Administration
     </h2>

    </div>

        <form method="POST">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username">

            <input type="password" name="password" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-primary w-100">
                Login
            </button>

        </form>

        {% if error %}

        <div class="alert alert-danger mt-3">
            {{ error }}
        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
