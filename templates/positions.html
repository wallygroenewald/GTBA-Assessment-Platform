<!DOCTYPE html>
<html>
<head>

    <title>Manage Positions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="main-card">
<div class="text-left mb-4">

    <a href="/dashboard" class="btn btn-primary me-2">
        Dashboard
    </a>

    <a href="/candidates" class="btn btn-success me-2">
        Candidates
    </a>

    <a href="/positions" class="btn btn-dark me-2">
        Positions
    </a>

    <a href="/users" class="btn btn-warning me-2">
        Users
    </a>

    <a href="/logout" class="btn btn-danger">
        Logout
    </a>
<a href="/settings" class="btn btn-info me-2">
    Settings
</a>
</div>
        <div class="text-center mb-4">

            <img src="{{ url_for('static', filename='gtba_logo.png') }}"
                 alt="GTBA Talent Platform Logo"
                 style="max-width:220px; height:auto;">

        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>

                Manage Positions

            </h2>

         

        </div>

        <form method="POST">

            <input type="text"
                   name="name"
                   class="form-control mb-4"
                   placeholder="Position Name"
                   required>

            <button class="btn btn-primary w-100">

                Add Position

            </button>

        </form>

        <hr class="my-5">

        <table class="table table-striped">

            <thead class="table-dark">

                <tr>

                    <th>Position</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for p in positions %}

                <tr>

                    <td>

                        {{ p.name }}

                    </td>

                    <td>

                        <a href="/questions/{{ p.id }}"
                           class="btn btn-dark btn-sm">

                            Manage Questions

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
